services:
  db:
    image: postgres:16
    restart: "unless-stopped"
    environment:
      POSTGRES_USER: dais
      POSTGRES_PASSWORD: dais
      POSTGRES_DB: dais
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dais -d dais"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    ports:
      - "51992:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    command: npm run dev
    environment:
      PORT: 3001
    ports:
      - "51991:3001"
    volumes:
      - ./:/app
      - /app/node_modules
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
